services:
  nginx:
    build: ./requirements/nginx
    ports:
      - "443:443"
    depends_on:
      wordpress:
        condition: service_started
    volumes:
      - db:/var/lib/mysql
    networks:
      - inception
    restart: always

  wordpress:
    build: ./requirements/wordpress
    env_file: .env
    volumes:
      - wp:/var/www/html
    depends_on:
      - mariadb
    networks:
      - inception
    restart: always

  mariadb:
    build: ./requirements/mariadb
    env_file: .env
    volumes:
      - wp:/var/www/html
    networks:
      - inception
    restart: always

volumes:
  db:
  wp:

networks:
  inception:
