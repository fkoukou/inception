services:
  nginx:
    build: ./requirements/nginx
    ports:
      - "443:443"
    depends_on:
      - wordpress
    volumes:
      - /home/fakoukou/data/wordpress:/var/www/html
    networks:
      - inception
    restart: always

  wordpress:
    build: ./requirements/wordpress
    env_file: .env
    volumes:
      - /home/fakoukou/data/wordpress:/var/www/html
    depends_on:
      - mariadb
    networks:
      - inception
    restart: always

  mariadb:
    build: ./requirements/mariadb
    env_file: .env
    volumes:
      - /home/fakoukou/data/mariadb:/var/lib/mysql
    networks:
      - inception
    restart: always

networks:
  inception: